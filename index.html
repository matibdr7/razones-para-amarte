<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razones Para Amarte</title>
    <!-- Cargando Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cargando FontAwesome para los íconos (estrellas, candados, whatsapp) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Cargando fuentes románticas de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Un fondo oscuro que combina con tonos turquesa */
            background: linear-gradient(to bottom, #0f172a, #164e63, #083344);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Animaciones para las tarjetas y el modal */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        
        .card-glow:hover {
            box-shadow: 0 0 25px rgba(45, 212, 191, 0.4);
        }
    </style>
</head>
<body class="relative">

    <!-- Canvas para el fondo estrellado -->
    <canvas id="starsCanvas" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <main class="relative z-10 container mx-auto px-4 py-12 md:py-20 flex flex-col items-center">
        <!-- Título principal -->
        <h1 class="text-4xl md:text-6xl text-transparent bg-clip-text bg-gradient-to-r from-teal-200 via-cyan-300 to-teal-400 font-serif text-center mb-4 tracking-wide">
            7 Días, 7 Razones
        </h1>
        <p class="text-teal-100/80 text-lg md:text-xl text-center mb-16 max-w-xl font-light">
            Un simple detallito para intentar sacarte una sonrisita cada dia, a pesar de nuestra distancia, espero que te guste mi amorcito, te amo muchisisisisismooo
        </p>

        <!-- Cronómetro para el próximo día habilitado -->
        <div id="countdownCard" class="mb-10 w-full max-w-3xl rounded-3xl border border-teal-500/30 bg-slate-900/70 px-6 py-5 text-center shadow-xl">
            <p class="text-sm uppercase tracking-[0.24em] text-teal-200/80 mb-2">Próximo día disponible</p>
            <div class="flex flex-col items-center justify-center gap-2 sm:flex-row sm:gap-6">
                <span id="countdownLabel" class="text-lg text-teal-100 font-medium"></span>
                <span id="countdownTimer" class="text-4xl md:text-5xl font-serif text-white tracking-[0.35em]"></span>
            </div>
        </div>

        <!-- Contenedor donde se inyectarán las tarjetas (grilla) -->
        <div id="daysGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full max-w-6xl">
            <!-- Las tarjetas se generan dinámicamente con JavaScript -->
        </div>
    </main>

    <!-- Modal (Ventana emergente que se abre al tocar un día) -->
    <div id="dayModal" class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-md flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-teal-500/30 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-[0_0_50px_rgba(20,184,166,0.15)] relative flex flex-col transform scale-95 transition-transform duration-300" id="modalContent">
            
            <!-- Botón de cerrar -->
            <button onclick="closeModal()" class="absolute top-5 right-5 text-teal-400/60 hover:text-teal-300 text-2xl z-10 transition-colors">
                <i class="fa-solid fa-times"></i>
            </button>

            <div class="p-8 md:p-12 flex flex-col items-center text-center">
                <!-- Subtítulo (ej. "Domingo") -->
                <h2 id="modalDayTitle" class="text-teal-400/80 font-serif text-xl md:text-2xl mb-2 italic"></h2>
                <!-- Título principal de la razón -->
                <h3 id="modalDate" class="text-white text-3xl md:text-4xl font-serif font-bold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-teal-100 to-teal-300"></h3>

                <!-- Contenedor de la foto estilo Polaroid -->
                <div class="w-full max-w-sm mb-8 rounded-xl overflow-hidden shadow-2xl shadow-black/50 border-[6px] border-white bg-white p-1 transform rotate-2 transition-transform hover:rotate-0 duration-300">
                    <img id="modalImage" src="" alt="Nuestra foto" class="w-full h-64 md:h-80 object-cover rounded mb-2">
                    <p id="modalImageCaption" class="text-slate-800 font-serif text-base italic py-3 bg-white"></p>
                </div>

                <!-- Texto de la razón -->
                <div class="relative max-w-lg mx-auto">
                    <i class="fa-solid fa-quote-left text-3xl text-teal-500/20 absolute -top-4 -left-6"></i>
                    <p id="modalText" class="text-lg md:text-xl leading-relaxed text-teal-50 font-light whitespace-pre-line"></p>
                    <i class="fa-solid fa-quote-right text-3xl text-teal-500/20 absolute -bottom-4 -right-6"></i>
                </div>

                <!-- Botón de Acción (WhatsApp para el regalo) -->
                <div id="modalActionContainer" class="mt-12 hidden w-full flex justify-center">
                    <a id="modalActionButton" href="#" target="_blank" class="inline-flex items-center justify-center gap-3 px-8 py-4 rounded-full text-white font-medium text-lg transition-all hover:scale-105 shadow-lg w-full sm:w-auto">
                        <i id="modalActionIcon" class="fa-brands fa-whatsapp text-2xl"></i>
                        <span id="modalActionText">Botón</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE LOS DÍAS ---
        // Aquí puedes cambiar 'isUnlocked' a true para habilitar cada día.
        // También puedes modificar los textos y las URLs de las imágenes.
        const daysData = [
            {
                id: 1,
                dayName: "Domingo (la previa)",
                title: "¡Bienvenida a nuestra semana!",
                isUnlocked: true, // ¡Hoy es el único desbloqueado!
                icon: "fa-gift", // Ícono especial por ser sorpresa
                text: "Holi mi vida, hice este jueguito simple para ponerle un toquecito de amor a la semana, consiste en que cada dia de la semana vas a ir desbloqueando razones que tengo para amarte, espero disfrutes la dinamica, TE AMOOO. Hoy es dominguito y no podes terminar la semana sin tomar tu heladito semanal asi que aqui lo podes reclamar",
                imageUrl: "imagenDomingo.jpeg", 
                imageCaption: " ÑAAAMMMM 🍦",
                actionButton: {
                    text: "Y que viva el helado de los findes!",
                    url: "https://api.whatsapp.com/send?text=Hola%20bro,%20quiero%20desbloquear%20mi%20heladito%20e%20🍧",
                    icon: "fa-whatsapp",
                    colorClass: "bg-[#25D366] hover:bg-[#128C7E] shadow-[0_0_20px_rgba(37,211,102,0.4)]"
                }
            },
            {
                id: 2,
                dayName: "Lunes",
                title: "Razon Lunes",
                isUnlocked: false, // Bloqueado por ahora
                icon: "fa-star",
                text: "Amo cómo tu sonrisa ilumina hasta mis días más oscuros. Incluso a través de una pantalla, verte sonreír me da la energía para enfrentar cualquier cosa. Eres mi luz.",
                imageUrl: "https://placehold.co/600x600/00BCD4/FFFFFF?text=Foto+Lunes",
                imageCaption: "Tu sonrisa mágica"
            },
            {
                id: 3,
                dayName: "Martes",
                title: "Razon Martes",
                isUnlocked: false,
                icon: "fa-compass",
                text: "Amo cómo siempre estás ahí para mí. Eres mi refugio seguro, la persona a la que quiero contarle todo lo bueno y lo malo que me pasa. Me haces sentir invencible.",
                imageUrl: "https://placehold.co/600x600/00ACC1/FFFFFF?text=Foto+Martes",
                imageCaption: "Siempre juntos"
            },
            {
                id: 4,
                dayName: "Miércoles",
                title: "Razon Miercoles",
                isUnlocked: false,
                icon: "fa-music",
                text: "Amo nuestras charlas interminables, nuestras bromas internas y cómo parecemos leernos la mente. La conexión que tenemos es única y no la cambiaría por nada del mundo.",
                imageUrl: "https://placehold.co/600x600/0097A7/FFFFFF?text=Foto+Miercoles",
                imageCaption: "Nuestras locuras"
            },
            {
                id: 5,
                dayName: "Jueves",
                title: "Razon Jueves",
                isUnlocked: false,
                icon: "fa-fire",
                text: "Admiro tu fuerza y tu pasión por todo lo que haces. Me inspiras cada día a ser una mejor persona. Eres increíblemente valiente y te admiro muchísimo.",
                imageUrl: "https://placehold.co/600x600/00838F/FFFFFF?text=Foto+Jueves",
                imageCaption: "Mi inspiración"
            },
            {
                id: 6,
                dayName: "Viernes",
                title: "Razon Viernes",
                isUnlocked: false,
                icon: "fa-moon",
                text: "Amo quedarme dormido escuchando tu respiración o tu voz al otro lado del teléfono. Has convertido la distancia en una excusa para valorar cada segundo que compartimos.",
                imageUrl: "https://placehold.co/600x600/203a43/FFFFFF?text=Foto+Viernes",
                imageCaption: "Buenas noches, amor"
            },
            {
                id: 7,
                dayName: "Sábado",
                title: "Razon Sabado",
                isUnlocked: false,
                icon: "fa-infinity",
                text: "Simplemente te amo por ser quien eres. Con tus virtudes y tus defectos. Eres la pieza que le faltaba a mi rompecabezas. Te elijo hoy y todos los días de mi vida.",
                imageUrl: "https://placehold.co/600x600/2c5364/FFFFFF?text=Foto+Sabado",
                imageCaption: "Te amo infinitamente"
            },
            {
                id: 8,
                dayName: "Domingo",
                title: "Razon Domingo",
                isUnlocked: false,
                icon: "fa-infinity",
                text: "Simplemente te amo por ser quien eres. Con tus virtudes y tus defectos. Eres la pieza que le faltaba a mi rompecabezas. Te elijo hoy y todos los días de mi vida.",
                imageUrl: "https://placehold.co/600x600/2c5364/FFFFFF?text=Foto+Sabado",
                imageCaption: "Te amo infinitamente"
            }
        ];

        const grid = document.getElementById('daysGrid');
        const modal = document.getElementById('dayModal');
        const modalContent = document.getElementById('modalContent');

        // Renderizar las tarjetas
        function renderDays() {
            grid.innerHTML = '';
            daysData.forEach((day, index) => {
                const isLocked = !day.isUnlocked;
                // Retraso de animación para efecto en cascada
                const animationDelay = index * 0.1;
                
                const card = document.createElement('div');
                card.className = `relative rounded-2xl p-6 flex flex-col items-center justify-center text-center transition-all duration-300 ${isLocked ? 'bg-slate-800/50 border border-slate-700 opacity-70 grayscale-[50%]' : 'bg-slate-800/80 border border-teal-500/40 cursor-pointer card-glow hover:-translate-y-2 floating'}`;
                card.style.animationDelay = `${animationDelay}s`;
                
                if (!isLocked) {
                    card.onclick = () => openModal(day.id);
                }

                card.innerHTML = `
                    <div class="w-16 h-16 rounded-full mb-4 flex items-center justify-center ${isLocked ? 'bg-slate-700 text-slate-500' : 'bg-teal-900/50 text-teal-300 shadow-[0_0_15px_rgba(45,212,191,0.5)]'}">
                        <i class="fa-solid ${isLocked ? 'fa-lock' : day.icon} text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-serif text-teal-50 mb-1">${day.dayName}</h3>
                    <p class="text-sm ${isLocked ? 'text-slate-500' : 'text-teal-300 font-medium'}">
                        ${isLocked ? 'Todavia no e, confianzuuda, pasiensia pasiensa' : '¡Toca para abrir!'}
                    </p>
                `;
                
                grid.appendChild(card);
            });
        }

        // Función para abrir la tarjeta corregida (aquí estaba el error)
        function openModal(dayId) {
            const day = daysData.find(d => d.id === dayId);
            if (!day) return;

            // Llenar datos en el HTML
            document.getElementById('modalDayTitle').innerText = day.dayName;
            document.getElementById('modalDate').innerText = day.title;
            document.getElementById('modalImage').src = day.imageUrl;
            document.getElementById('modalImageCaption').innerText = day.imageCaption;
            document.getElementById('modalText').innerText = day.text;

            // Manejar el botón de acción (WhatsApp)
            const actionContainer = document.getElementById('modalActionContainer');
            if (day.actionButton) {
                const actionBtn = document.getElementById('modalActionButton');
                actionBtn.href = day.actionButton.url;
                
                // Limpiar clases previas de color y asignar las de la configuración
                actionBtn.className = `inline-flex items-center justify-center gap-3 px-8 py-4 rounded-full text-white font-medium text-lg transition-all hover:scale-105 shadow-lg w-full sm:w-auto ${day.actionButton.colorClass}`;
                
                document.getElementById('modalActionText').innerText = day.actionButton.text;
                document.getElementById('modalActionIcon').className = `fa-brands ${day.actionButton.icon} text-2xl`;
                
                // Mostrar contenedor
                actionContainer.classList.remove('hidden');
                actionContainer.classList.add('flex');
            } else {
                actionContainer.classList.add('hidden');
                actionContainer.classList.remove('flex');
            }

            // Mostrar el modal con animación suave
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // --- LÓGICA DEL FONDO DE ESTRELLAS (CANVAS) ---
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const numStars = Math.floor((canvas.width * canvas.height) / 3000); // Densidad de estrellas
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    color: Math.random() > 0.8 ? '#67e8f9' : '#ffffff' // Algunas estrellas celestes
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                // Hacer que titilen
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) {
                    star.speed = -star.speed;
                }
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = star.color;
                ctx.globalAlpha = Math.abs(star.alpha);
                ctx.fill();
            });
            
            requestAnimationFrame(animateStars);
        }

        // Calcula la próxima medianoche local y muestra el día siguiente
        function getNextUnlockedDayInfo() {
            const now = new Date();
            const targetDate = new Date(now);
            targetDate.setHours(24, 0, 0, 0); // la próxima medianoche local

            const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const nextDayName = dayNames[targetDate.getDay()];

            const lockedDays = daysData.filter(day => !day.isUnlocked);
            if (lockedDays.length === 0) {
                return { label: 'Ya está todo desbloqueado', target: null };
            }

            return {
                label: `Cuenta regresiva para ${nextDayName} (00:00)`,
                target: targetDate
            };
        }

        function formatCountdown(ms) {
            if (ms <= 0) return '00:00:00';
            const totalSeconds = Math.floor(ms / 1000);
            const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const seconds = String(totalSeconds % 60).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        function updateCountdown() {
            const countdownLabel = document.getElementById('countdownLabel');
            const countdownTimer = document.getElementById('countdownTimer');
            const info = getNextUnlockedDayInfo();

            countdownLabel.textContent = info.label;
            if (!info.target) {
                countdownTimer.textContent = '--:--:--';
                return;
            }

            const now = new Date();
            const diff = info.target - now;
            countdownTimer.textContent = formatCountdown(diff);

            if (diff <= 0) {
                // Forzar re-render si el día cambió justo a medianoche
                renderDays();
            }
        }

        // Iniciar todo al cargar
        window.addEventListener('resize', resizeCanvas);
        window.onload = function() {
            resizeCanvas();
            animateStars();
            renderDays();
            updateCountdown();
            setInterval(updateCountdown, 1000);
        };

        // Cerrar modal si hacen click fuera de él
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

    </script>
</body>
</html>
